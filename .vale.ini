StylesPath = .config/styles
MinAlertLevel = suggestion

Vocab = Guide

Packages = Microsoft

[*.{md,mdx}]
BasedOnStyles = gitlab_base, Microsoft

# Disable GitLab rules that are GitLab-only
gitlab_base.CIConfigFile = NO
gitlab_base.EOLWhitespace = NO      # rumdl MD009
gitlab_base.ListIndentation = NO
gitlab_base.Offerings = NO
gitlab_base.OutdatedVersions = NO

# Disable Microsoft rules that overlap with GitLab/rumdl
Microsoft.HeadingPunctuation = NO   # rumdl MD026
Microsoft.OxfordComma = NO
Microsoft.SentenceLength = NO
Microsoft.Units = NO
Microsoft.Avoid = NO
Microsoft.Spacing = NO
Microsoft.Suspended = NO
Microsoft.Foreign = NO   ; gitlab_base.LatinTerms
Microsoft.Plurals = NO   ; gitlab_base.BadPlurals

# Disable Microsoft rules that fight the collegial voice:
# first-person accounts, "we" as a collaborative project,
# deliberate semicolons, and adverbs/passive where they earn their place
Microsoft.We = NO
Microsoft.FirstPerson = NO
Microsoft.Semicolon = NO
Microsoft.Adverbs = NO
Microsoft.Passive = NO

# Disable Microsoft rules that are wrong for this subject or audience:
# Terms rewrites "agent" and "chatbots"; HeadingAcronyms flags "AI" in headings;
# GeneralURL and Acronyms assume a general consumer audience
Microsoft.Terms = NO
Microsoft.HeadingAcronyms = NO
Microsoft.GeneralURL = NO
Microsoft.Acronyms = NO
